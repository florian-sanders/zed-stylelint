name: Publish Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Publish Release
        uses: florian-sanders/zed-stylelint-actions/publish-release@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
