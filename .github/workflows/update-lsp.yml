name: Update LSP

on:
  schedule:
    # Check for new vscode-stylelint releases every Monday at 9am UTC
    - cron: '0 9 * * 1'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'LSP version to update to (e.g., 1.7.0). Leave empty to auto-detect.'
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-lsp
  cancel-in-progress: false

jobs:
  # Rebase any open update-lsp-* PR when main is updated
  rebase:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase LSP Update PR
        uses: florian-sanders/zed-stylelint-actions/rebase-lsp-pr@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  update:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update LSP
        uses: florian-sanders/zed-stylelint-actions/update-lsp@v1
        with:
          version: ${{ inputs.version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
